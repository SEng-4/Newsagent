<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsagent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <h1>Newsagent</h1>

    <div id="main-layout">
    <table id="products">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Type</th>
                <th>Cart</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    </table>

    <div id="cart-section">
        <h2>Your Cart</h2>
        <div id="cart-items"></div>
        <div id="cart-total">Total: €0.00</div>
        <button id="checkout-btn" disabled>Checkout</button>
        <div id="receipt-area"></div>
    </div>
    </div> <!-- end main-layout -->

    <div class="btn-group">
        <button id="create-btn" class="ui-btn">Add Product</button>
        <button id="edit-btn" onclick="enterEditMode()" class="ui-btn">Edit Products</button>
        <button id="save-btn" onclick="saveEdits()" class="ui-btn">Save</button>
        <button id="discard-btn" onclick="discardEdits()" class="ui-btn">Discard</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
