<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsagent</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <h1>Newsagent</h1>

    <table id="products" border="2">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Type</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <button id="create-btn" class="ui-btn">
    <span>+</span>
    Add Product
    </button>

    <button id="create-btn">Add Product</button>
    <button id="edit-btn" onclick="enterEditMode()">Edit Products</button>
    <button id="save-btn" onclick="saveEdits()">Save</button>
    <button id="discard-btn" onclick="discardEdits()">Discard</button>

    <script src="script.js"></script>
</body>
</html>
