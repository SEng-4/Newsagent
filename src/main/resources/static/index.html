<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsagent</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <h1>Newsagent</h1>

    <table id="products">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Type</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
<div class = "btn-group">

    <button id="create-btn" class="ui-btn">Add Product</button>
    <button id="edit-btn" onclick="enterEditMode()" class="ui-btn">Edit Products</button>
    <button id="save-btn" onclick="saveEdits()" class="ui-btn">Save</button>
    <button id="discard-btn" onclick="discardEdits ()" class="ui-btn">Discard</button>
</div>
    <script src="script.js"></script>
</body>
</html>
